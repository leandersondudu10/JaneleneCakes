<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JaneleneCakes - Pedido Online</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #fff5f8; color: #444; padding: 15px; }
        .container { max-width: 450px; background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 25px rgba(216, 27, 96, 0.1); margin: auto; }
        h2 { color: #d81b60; text-align: center; margin-bottom: 5px; }
        p.subtitle { text-align: center; font-style: italic; color: #ad1457; margin-bottom: 20px; }
        label { font-weight: bold; display: block; margin-top: 15px; color: #880e4f; }
        select, input { width: 100%; padding: 12px; margin-top: 5px; border: 2px solid #fce4ec; border-radius: 10px; box-sizing: border-box; outline: none; transition: 0.3s; font-size: 14px; }
        select:focus, input:focus { border-color: #f06292; }
        .total-box { background: #fce4ec; padding: 20px; border-radius: 12px; margin-top: 25px; text-align: center; border: 1px dashed #d81b60; }
        .total-box span { font-size: 1.4em; color: #d81b60; display: block; font-weight: bold; }
        .total-box small { color: #ad1457; font-weight: bold; }
        button { width: 100%; background: #25d366; color: white; border: none; padding: 18px; border-radius: 10px; font-size: 1.1em; font-weight: bold; cursor: pointer; margin-top: 20px; box-shadow: 0 4px 10px rgba(37, 211, 102, 0.3); }
        button:hover { background: #1ebe57; }
        .hidden { display: none; }
        .footer-info { font-size: 0.8em; text-align: center; margin-top: 15px; color: #999; }
    </style>
</head>
<body>

<div class="container">
    <h2>🎂 JaneleneCakes</h2>
    <p class="subtitle">Tudo feito com muito amor 💝</p>

    <label>Seu Nome:</label>
    <input type="text" id="nome" placeholder="Ex: Maria Silva">

    <div style="display: flex; gap: 10px;">
        <div style="flex: 1;">
            <label>Data:</label>
            <input type="date" id="data">
        </div>
        <div style="flex: 1;">
            <label>Hora:</label>
            <input type="time" id="hora">
        </div>
    </div>

    <label>Tamanho do Bolo:</label>
    <select id="tamanho" onchange="toggleRecheios(); calcular();">
        <option value="90" data-fatias="10">10 Fatias - R$ 90,00</option>
        <option value="120" data-fatias="18">18 Fatias - R$ 120,00</option>
        <option value="150" data-fatias="28">28 Fatias - R$ 150,00</option>
        <option value="185" data-fatias="40">40 Fatias - R$ 185,00</option>
    </select>

    <label>Massa do Bolo:</label>
    <select id="massa">
        <option>Baunilha</option>
        <option>Chocolate</option>
        <option>Formigueiro</option>
        <option>Mesclado</option>
        <option>Napolitano</option>
        <option>Red Velvet</option>
    </select>

    <label id="labelRecheio1">Sabor do Recheio:</label>
    <select id="recheio1" onchange="calcular()">
        <option value="0" data-nome="Brigadeiro">Brigadeiro de Chocolate</option>
        <option value="0" data-nome="Ninho">Ninho</option>
        <option value="0" data-nome="Beijinho">Beijinho</option>
        <option value="0" data-nome="Limão">Brigadeiro de Limão</option>
        <option value="5" data-nome="Crocante">Crocante (+R$ 5)</option>
        <option value="5" data-nome="Oreo">Ninho com Oreo (+R$ 5)</option>
        <option value="5" data-nome="Paçoca">Paçoca (+R$ 5)</option>
        <option value="10" data-nome="Abacaxi">Delícia de Abacaxi (+R$ 10)</option>
        <option value="10" data-nome="Morango">Delícia de Morango (+R$ 10)</option>
    </select>

    <div id="divRecheio2" class="hidden">
        <label>2º Sabor de Recheio (Opcional):</label>
        <select id="recheio2" onchange="calcular()">
            <option value="0" data-nome="Nenhum">-- Deseja apenas um sabor --</option>
            <option value="0" data-nome="Brigadeiro">Brigadeiro de Chocolate</option>
            <option value="0" data-nome="Ninho">Ninho</option>
            <option value="0" data-nome="Beijinho">Beijinho</option>
            <option value="0" data-nome="Limão">Brigadeiro de Limão</option>
            <option value="5" data-nome="Crocante">Crocante (+R$ 5)</option>
            <option value="5" data-nome="Oreo">Ninho com Oreo (+R$ 5)</option>
            <option value="5" data-nome="Paçoca">Paçoca (+R$ 5)</option>
            <option value="10" data-nome="Abacaxi">Delícia de Abacaxi (+R$ 10)</option>
            <option value="10" data-nome="Morango">Delícia de Morango (+R$ 10)</option>
        </select>
    </div>

    <label>Topo do Bolo:</label>
    <select id="topo" onchange="calcular()">
        <option value="0">1. Não quero topo</option>
        <option value="0">2. Topo a combinar</option>
    </select>

    <div class="total-box">
        VALOR TOTAL: R$ <span id="valorTotal">90,00</span>
        <small>Sinal de 50% para reserva: R$ <span id="valorSinal">45,00</span></small>
    </div>

    <button onclick="enviarWhatsApp()">Confirmar Pedido via WhatsApp 📱</button>
    
    <p class="footer-info">⚠️ Obs: Bolos possuem canudos de sustentação. Cuidado ao cortar!</p>
</div>

<script>
    function toggleRecheios() {
        const tamanho = document.getElementById('tamanho').value;
        const divRecheio2 = document.getElementById('divRecheio2');
        const labelR1 = document.getElementById('labelRecheio1');

        if (tamanho === "90") { 
            divRecheio2.classList.add('hidden');
            document.getElementById('recheio2').value = "0";
            labelR1.innerText = "Sabor do Recheio:";
        } else {
            divRecheio2.classList.remove('hidden');
            labelR1.innerText = "1º Sabor de Recheio:";
        }
    }

    function calcular() {
        let base = parseFloat(document.getElementById('tamanho').value);
        let r1 = parseFloat(document.getElementById('recheio1').value);
        let r2 = parseFloat(document.getElementById('recheio2').value);
        
        let total = base + r1 + r2;
        document.getElementById('valorTotal').innerText = total.toFixed(2).replace('.', ',');
        document.getElementById('valorSinal').innerText = (total / 2).toFixed(2).replace('.', ',');
    }

    function enviarWhatsApp() {
        const nome = document.getElementById('nome').value;
        const data = document.getElementById('data').value;
        const hora = document.getElementById('hora').value;
        const fatias = document.getElementById('tamanho').options[document.getElementById('tamanho').selectedIndex].getAttribute('data-fatias');
        const massa = document.getElementById('massa').value;
        const topo = document.getElementById('topo').options[document.getElementById('topo').selectedIndex].text;
        const total = document.getElementById('valorTotal').innerText;

        const r1Nome = document.getElementById('recheio1').options[document.getElementById('recheio1').selectedIndex].getAttribute('data-nome');
        const r2Element = document.getElementById('recheio2');
        const r2Nome = r2Element.options[r2Element.selectedIndex].getAttribute('data-nome');

        if(!nome || !data || !hora) { 
            alert("Preencha Nome, Data e Hora, por favor!"); 
            return; 
        }

        let recheiosTexto = r1Nome;
        if (fatias !== "10" && r2Nome !== "Nenhum") {
            recheiosTexto += ` e ${r2Nome}`;
        }

        let dataBR = data.split('-').reverse().join('/');
        let numeroFone = "5585997800232"; 
        
        let mensagem = `Olá Jane! Novo pedido solicitado:%0A%0A` +
            `👤 *Cliente:* ${nome}%0A` +
            `📅 *Data:* ${dataBR} às ${hora}%0A` +
            `🎂 *Bolo:* ${fatias} fatias%0A` +
            `🍞 *Massa:* ${massa}%0A` +
            `🍫 *Recheio:* ${recheiosTexto}%0A` +
            `🎀 *Topo:* ${topo}%0A%0A` +
            `💰 *Valor Total:* R$ ${total}%0A` +
            `💳 *Entrada (50%):* R$ ${document.getElementById('valorSinal').innerText}`;

        window.open(`https://wa.me/${numeroFone}?text=${mensagem}`, '_blank');
    }
</script>

</body>
</html>
